<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>福岡市U-11 1部リーグ Aパート｜リアルタイム順位表</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1a6b3c;--green-mid:#2d8f54;--green-light:#e8f5ee;
  --pitch:#0f5c2e;--gold:#f0a500;--bronze:#c47a3a;
  --bg:#f5f7f4;--text:#1a2014;--text-muted:#5a6b52;
  --border:#d4dece;--card:#ffffff;--us-bg:#e8f0fb;--us-text:#1a5c2e;
  --live-red:#e02020;--live-bg:#fff0f0;
}
body{font-family:"Noto Sans JP",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.header{background:var(--pitch);padding:0;position:relative;overflow:hidden}
.header::before{content:"";position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,rgba(255,255,255,.03) 0,rgba(255,255,255,.03) 1px,transparent 1px,transparent 40px),
             repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0,rgba(255,255,255,.03) 1px,transparent 1px,transparent 40px);
  z-index:0}
.header-inner{position:relative;width:100%;max-width:720px;margin:0 auto;display:flex;align-items:stretch;z-index:1}
.header-text{padding:18px 20px 22px;flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.header-photo{width:280px;flex-shrink:0;position:relative;overflow:hidden;clip-path:polygon(8% 0%,100% 0%,100% 100%,0% 100%)}
.header-photo img{width:100%;height:100%;object-fit:cover;object-position:left center;display:block;opacity:.9}
.header-photo::after{content:"";position:absolute;inset:0;background:linear-gradient(to right,var(--pitch) 0%,transparent 18%)}
@media(max-width:500px){
  .header-photo{width:160px;clip-path:polygon(10% 0%,100% 0%,100% 100%,0% 100%)}
  .header-photo::after{background:linear-gradient(to right,var(--pitch) 0%,transparent 22%)}
  .header-title{font-size:clamp(16px,4.5vw,22px);white-space:normal}
  .header-text{padding:14px 14px 20px}
  .match-team-logo{width:52px;height:52px}
  .match-team-name{font-size:13px}
}
.header-eyebrow{font-family:"Barlow Condensed",sans-serif;font-size:11px;letter-spacing:.15em;color:rgba(255,255,255,.5);text-transform:uppercase;margin-bottom:6px}
.header-title{font-family:"Barlow Condensed",sans-serif;font-size:clamp(20px,5vw,28px);font-weight:700;color:#fff;line-height:1.15;margin-bottom:10px}
.header-title span{color:var(--gold)}
.live-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(240,165,0,.18);border:1px solid rgba(240,165,0,.5);color:var(--gold);font-family:"Barlow Condensed",sans-serif;font-size:12px;letter-spacing:.1em;padding:3px 10px;border-radius:20px;align-self:flex-start}
.live-pill::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--gold);animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.main{max-width:720px;margin:0 auto;padding:24px 16px 40px}
.section-label{font-family:"Barlow Condensed",sans-serif;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.section-label::after{content:"";flex:1;height:1px;background:var(--border)}

.matches-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:500px){.matches-grid{grid-template-columns:1fr}}

.match-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;transition:border-color .2s,background .2s}
.match-card.is-live{border-color:var(--live-red);background:var(--live-bg)}
.match-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.match-time{font-family:"Barlow Condensed",sans-serif;font-size:12px;letter-spacing:.05em;color:var(--text-muted)}
.live-badge{display:inline-flex;align-items:center;gap:4px;font-family:"Barlow Condensed",sans-serif;font-size:12px;font-weight:700;color:var(--live-red);letter-spacing:.05em}
.live-badge::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--live-red);animation:pulse 1.2s ease-in-out infinite}

.match-row{display:flex;align-items:center;justify-content:space-between;gap:4px}
.match-team-block{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:0}
.match-team-logo{width:44px;height:44px;object-fit:contain;border-radius:6px;}
.match-team-name{font-size:11px;font-weight:500;color:var(--text);text-align:center;line-height:1.2;word-break:keep-all}
.score-box{display:flex;align-items:center;gap:3px;flex-shrink:0}
.score-input{width:34px;height:34px;text-align:center;font-family:"Barlow Condensed",sans-serif;font-size:18px;font-weight:700;border:1.5px solid var(--border);border-radius:6px;background:#fafbf9;color:var(--text);transition:border-color .15s}
.score-input:focus{outline:none;border-color:var(--green-mid)}
.score-input:not(:placeholder-shown){background:var(--green-light);border-color:var(--green-mid)}
.match-card.is-live .score-input:not(:placeholder-shown){background:#ffe0e0;border-color:var(--live-red)}
.score-sep{font-family:"Barlow Condensed",sans-serif;font-size:16px;color:var(--text-muted)}

.standings-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.standings-table{width:100%;border-collapse:collapse;font-size:13px}
.standings-table thead{background:var(--pitch)}
.standings-table thead th{font-family:"Barlow Condensed",sans-serif;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.65);padding:9px 6px;text-align:center;font-weight:600}
.standings-table thead th.col-team{text-align:left;padding-left:10px}
.standings-table tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
.standings-table tbody tr:last-child{border-bottom:none}
.standings-table tbody tr:hover{background:#f8faf7}
.standings-table tbody tr.row-us{background:#eaf5ee}
.standings-table tbody tr.row-us:hover{background:#d8eddf}
.standings-table td{padding:9px 6px;text-align:center;color:var(--text)}
.standings-table td.col-team{text-align:left;padding-left:10px}
.rank-cell{width:30px}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:700}
.r1{background:var(--gold);color:#3d2800}
.r2{background:#c8d0d8;color:#2a3540}
.r3{background:var(--bronze);color:#3d1a00}
.r-other{background:#eaede7;color:var(--text-muted)}
.team-cell-inner{display:flex;align-items:center;gap:8px}
.team-logo-sm{width:28px;height:28px;object-fit:contain;border-radius:4px;flex-shrink:0;}
.team-name-cell{font-weight:500;font-size:13px}
.team-name-us{color:#1a5c2e;font-weight:700}
.pts-cell{font-family:"Barlow Condensed",sans-serif;font-size:17px;font-weight:700;color:var(--green)}
.gd-pos{color:var(--green-mid);font-weight:500}
.gd-neg{color:#c0392b;font-weight:500}

.tb-notes{margin-top:10px}
.tb-note{font-size:11px;color:var(--text-muted);background:#fffbf0;border-left:3px solid var(--gold);padding:6px 10px;border-radius:0 6px 6px 0;margin-bottom:6px}

.past-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.past-table{width:100%;border-collapse:collapse;font-size:12px}
.past-table thead{background:var(--pitch)}
.past-table thead th{font-family:"Barlow Condensed",sans-serif;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.65);padding:8px 12px;text-align:left;font-weight:600}
.past-table tbody{border-collapse:collapse}
.past-row-date td{border:none;background:transparent;padding:10px 12px 3px;vertical-align:middle}
.past-row-match td{border:none;border-bottom:1px solid var(--border);padding:8px 12px;vertical-align:middle}
.past-row-match:last-child td{border-bottom:none}
.past-date-cell{text-align:left;color:var(--text-muted);font-size:11px;font-weight:500;vertical-align:middle}
.past-match-cell{padding:8px 12px;vertical-align:middle}
.past-match-inner{display:flex;align-items:center;justify-content:space-between;gap:6px;min-height:36px}
.past-team{display:flex;align-items:center;gap:6px;flex:1}
.past-team.home{justify-content:flex-end}
.past-team.away{justify-content:flex-start}
.past-logo{width:28px;height:28px;object-fit:contain;border-radius:3px;flex-shrink:0;}
.past-team-name{font-size:12px;font-weight:500;color:var(--text)}
.past-us{color:#1a5c2e;font-weight:700}
.result-score{font-family:"Barlow Condensed",sans-serif;font-size:16px;font-weight:700;background:var(--green-light);color:var(--green);padding:3px 10px;border-radius:4px;white-space:nowrap;min-width:52px;text-align:center;display:inline-block}
.result-score{font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:700;background:var(--green-light);color:var(--green);padding:2px 8px;border-radius:4px;white-space:nowrap}
.past-us{color:#1a5c2e;font-weight:700}

.reset-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text-muted);border:1px solid var(--border);border-radius:6px;padding:5px 12px;cursor:pointer;background:transparent;transition:background .1s}
.reset-btn:hover{background:var(--green-light);border-color:var(--green-mid);color:var(--green)}

.footer{text-align:center;font-size:11px;color:var(--text-muted);padding:24px 0 36px;border-top:1px solid var(--border);margin-top:28px}.footer-copy{font-size:10px;color:var(--text-muted);line-height:1.8;letter-spacing:.03em}
@media(max-width:520px){
  .standings-table .hide-sp,.past-table .hide-sp{display:none}
  .standings-table td,.standings-table th{padding:7px 3px}
}

    if(h!==''&&a!=='') data[m.id] = {h:parseInt(h)||0, a:parseInt(a)||0};
  });
  try {
    document.getElementById('sync-status').textContent='⟳ 同期中...';
    await fetch(FIREBASE_URL+'/scores.json', {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(data)
    });
  document.getElementById('sync-status').textContent='✓ 同期済み';
  setTimeout(()=>{const el=document.getElementById('sync-status');if(el)el.textContent='';},2000);
  } catch(e){ console.error('Save failed',e);document.getElementById('sync-status').textContent='✗ エラー'; }
}

// Firebase Realtime DB: load scores
async function loadScores() {
  try {
    const res = await fetch(FIREBASE_URL+'/scores.json');
    const data = await res.json();
    if(!data) return;
    MATCHES.forEach(m => {
      if(data[m.id]) {
        const ih = document.getElementById(m.id+'_h');
        const ia = document.getElementById(m.id+'_a');
        if(ih && data[m.id].h !== undefined) ih.value = data[m.id].h;
        if(ia && data[m.id].a !== undefined) ia.value = data[m.id].a;
      }
    });
    renderStandings();
  } catch(e){ console.error('Load failed',e); }
}

  setInterval(async () => {
    await loadScores();
    refreshLive();
  }, 15000);

const MATCH_DATE = {year:2026,month:6,day:14};
const LIVE_BEFORE=1, LIVE_AFTER=45;

function isLive(koH,koM){
  const now=new Date();
  const jst=new Date(now.toLocaleString('en-US',{timeZone:'Asia/Tokyo'}));
  if(jst.getFullYear()!==MATCH_DATE.year||jst.getMonth()+1!==MATCH_DATE.month||jst.getDate()!==MATCH_DATE.day)return false;
  const nowMin=jst.getHours()*60+jst.getMinutes();
  const koMin=koH*60+koM;
  return nowMin>=koMin-LIVE_BEFORE&&nowMin<=koMin+LIVE_AFTER;
}

function getScore(id){
  const h=document.getElementById(id+'_h')?.value,a=document.getElementById(id+'_a')?.value;
  if(h===''||a===''||h==null||a==null)return null;
  const hv=parseInt(h),av=parseInt(a);
  if(isNaN(hv)||isNaN(av)||hv<0||av<0)return null;
  return{h:hv,a:av};
}

function buildH2H(nr){
  const all=[...ALL_H2H_BASE];
  for(const m of MATCHES){const s=nr[m.id];if(s)all.push([m.home,m.away,s.h,s.a]);}
  const map={};
  for(const [h,a,hg,ag] of all){
    for(const[t1,t2]of[[h,a],[a,h]]){if(!map[t1])map[t1]={};if(!map[t1][t2])map[t1][t2]={pts:0,gf:0,ga:0};}
    map[h][a].gf+=hg;map[h][a].ga+=ag;map[a][h].gf+=ag;map[a][h].ga+=hg;
    if(hg>ag)map[h][a].pts+=3;else if(hg<ag)map[a][h].pts+=3;else{map[h][a].pts+=1;map[a][h].pts+=1;}
  }
  return map;
}

function calcStandings(){
  const nr={};
  for(const m of MATCHES){const s=getScore(m.id);if(s)nr[m.id]=s;}
  const teams={};
  for(const[name,base]of Object.entries(BASE))teams[name]={...base,name,played:base.w+base.d+base.l};
  for(const m of MATCHES){
    const s=nr[m.id];if(!s)continue;
    const ht=teams[m.home],at=teams[m.away];
    ht.gf+=s.h;ht.ga+=s.a;ht.played++;at.gf+=s.a;at.ga+=s.h;at.played++;
    if(s.h>s.a){ht.w++;ht.pts+=3;at.l++;}else if(s.h<s.a){at.w++;at.pts+=3;ht.l++;}else{ht.d++;ht.pts+=1;at.d++;at.pts+=1;}
  }
  const h2h=buildH2H(nr);
  const arr=Object.values(teams).map(t=>({...t,gd:t.gf-t.ga}));
  arr.sort((a,b)=>b.pts-a.pts);
  const groups=[];let i=0;
  while(i<arr.length){let j=i;while(j<arr.length&&arr[j].pts===arr[i].pts)j++;groups.push(arr.slice(i,j));i=j;}
  const notes=[],sorted=[];
  for(const grp of groups){
    if(grp.length===1){sorted.push(grp[0]);continue;}
    grp.sort((a,b)=>{
      const ns=grp.map(x=>x.name);
      const hp=t=>ns.reduce((s,n)=>n!==t.name?(h2h[t.name]?.[n]?.pts||0)+s:s,0);
      if(hp(b)!==hp(a))return hp(b)-hp(a);
      if(b.gd!==a.gd)return b.gd-a.gd;
      if(b.gf!==a.gf)return b.gf-a.gf;
      return 0;
    });
    const ns=grp.map(x=>x.name).join('・');
    const nms=grp.map(x=>x.name);
    const hpL=grp.map(t=>nms.reduce((s,n)=>n!==t.name?(h2h[t.name]?.[n]?.pts||0)+s:s,0));
    if(new Set(hpL).size>1)notes.push(`⚠️ 【${ns}】同勝点 → ②当該チーム間の対戦成績で決定`);
    else{
      if(new Set(grp.map(x=>x.gd)).size>1)notes.push(`⚠️ 【${ns}】同勝点・同当該成績 → ③総得失点差で決定`);
      else if(new Set(grp.map(x=>x.gf)).size>1)notes.push(`⚠️ 【${ns}】→ ④総得点数で決定`);
      else notes.push(`⚠️ 【${ns}】全項目タイ → ⑤抽選`);
    }
    sorted.push(...grp);
  }
  return{sorted,notes};
}

function renderStandings(){

  const tbody=document.getElementById('standings-body');tbody.innerHTML='';
  sorted.forEach((r,i)=>{
    const rank=i+1,rc=rank===1?'r1':rank===2?'r2':rank===3?'r3':'r-other';
    const isUs=r.name==='東福岡';
    const tr=document.createElement('tr');if(isUs)tr.className='row-us';
    const tdR=document.createElement('td');tdR.className='rank-cell';
    const rb=document.createElement('span');rb.className='rank-badge '+rc;rb.textContent=rank;tdR.appendChild(rb);

    const tdT=document.createElement('td');tdT.className='col-team';
    const inn=document.createElement('div');inn.className='team-cell-inner';
    inn.appendChild(makeLogoEl(r.name,'sm'));
    const ns=document.createElement('span');
    ns.className='team-name-cell'+(isUs?' team-name-us':'');
    ns.textContent=r.name;
    inn.appendChild(ns);
    // 「我々」削除、★のみ
    if(isUs){
      const star=document.createElement('span');
      star.textContent='★';
      star.style.cssText='color:#1a6b3c;font-size:13px;margin-left:3px;';
      inn.appendChild(star);
    }
    tdT.appendChild(inn);

    tr.append(tdR,tdT);
    const vals=[r.pts,r.played,r.w,r.d,r.l,r.gf,r.ga];
    vals.forEach((v,vi)=>{
      const td=document.createElement('td');
      if(vi===0)td.className='pts-cell';
      if([1,5,6].includes(vi))td.className=(td.className?td.className+' ':'')+'hide-sp';
      td.textContent=v;tr.appendChild(td);
    });
    const gdTd=document.createElement('td');
    const gd=r.gd;gdTd.className=gd>0?'gd-pos':gd<0?'gd-neg':'';
    gdTd.textContent=(gd>=0?'+':'')+gd;
    tr.appendChild(gdTd);
    tbody.appendChild(tr);
  });
  const ne=document.getElementById('tb-notes');ne.innerHTML='';
  notes.forEach(n=>{const d=document.createElement('div');d.className='tb-note';d.textContent=n;ne.appendChild(d);});
}

function resetAll(){
  if(!confirm('スコアをリセットしますか？')) return;
  MATCHES.forEach(m=>{
    const h=document.getElementById(m.id+'_h'),a=document.getElementById(m.id+'_a');
    if(h)h.value='';if(a)a.value='';
  });
  renderStandings();
  // Firebaseも同時にクリア
  fetch(FIREBASE_URL+'/scores.json', {method:'DELETE'})
    .then(()=>{ const el=document.getElementById('sync-status'); if(el){el.textContent='✓ リセット済み';setTimeout(()=>el.textContent='',2000);} })
    .catch(e=>console.error('Reset failed',e));
}

function refreshLive(){
  let changed=false;
  MATCHES.forEach(m=>{
    const card=document.getElementById('card-'+m.id);if(!card)return;
    if(isLive(m.koH,m.koM)!==card.classList.contains('is-live'))changed=true;
  });
  if(changed)renderMatches();
}


const PASSWORD = 'hiro';

function toggleLock() {
  if(isUnlocked) {
    // lock
    isUnlocked = false;
    document.getElementById('matches-grid').classList.add('input-locked');
    document.getElementById('lock-status').textContent = '🔒 閲覧モード';
    document.getElementById('lock-status').className = 'lock-status';
    document.getElementById('lock-btn').textContent = 'スコア入力';
  } else {
    // unlock
    const pw = prompt('パスワードを入力してください：');
    if(pw === PASSWORD) {
      isUnlocked = true;
      document.getElementById('matches-grid').classList.remove('input-locked');

      document.getElementById('lock-status').className = 'lock-status unlocked';
      document.getElementById('lock-btn').textContent = 'ロック';
    } else if(pw !== null) {
      alert('パスワードが違います');
    }
  }
}
